name: VShell (stable)
on:
  schedule:
    - cron: '20 0 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 下载并发布
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/download-and-release.sh vshell stable

